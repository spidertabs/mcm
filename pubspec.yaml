name: maternal_care_monitor
description: MCM - MaternalCare Monitor for Rubare Town Council.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: '>=3.0.0'

dependencies:
  flutter:
    sdk: flutter

  image_picker: ^1.1.2
  path_provider: ^2.1.4

  # State Management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Local Database
  sqflite: ^2.3.3+1
  path: ^1.9.0

  # Secure Storage
  flutter_secure_storage: ^9.2.2

  # Password Hashing
  bcrypt: ^1.1.3

  # Navigation
  go_router: ^14.2.7

  # Charts
  fl_chart: ^0.68.0

  # Notifications
  flutter_local_notifications: ^17.2.2

  # PDF Generation
  pdf: ^3.11.1
  printing: ^5.13.2

  # Utilities
  intl: ^0.19.0
  uuid: ^4.4.2
  equatable: ^2.0.5
  dartz: ^0.10.1

  # UI Extras
  flutter_svg: ^2.0.10+1
  shimmer: ^3.0.0
  gap: ^3.0.1
  sqflite_common_ffi_web: ^1.1.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.11
  riverpod_generator: ^2.4.3
  mockito: ^5.4.4
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/mcm_icon.png"
  min_sdk_android: 21
  android_icon_name: "ic_launcher"
  adaptive_icon_background: "#4A1580"
  adaptive_icon_foreground: "assets/images/mcm_icon_fg.png"
  web:
    generate: true
    image_path: "assets/images/mcm_icon.png"
  windows:
    generate: true
    image_path: "assets/images/mcm_icon.png"
    icon_size: 48
  macos:
    generate: true
    image_path: "assets/images/mcm_icon.png"

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/fonts/
    - assets/json/